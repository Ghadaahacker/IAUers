<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>IAU'ers Student - Profile</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
    rel="stylesheet"
  />

  <link
    rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
  />

  <link rel="stylesheet" href="../CSS/profile.css" />
  <link rel="stylesheet" href="../../Shared/CSS/student-sidebar.css" />
</head>

<body>
  <div class="layout">

    <div id="student-sidebar"></div>

    <main class="main-content">

      <section class="page-header-bar">
        <div>
          <h1>My Profile</h1>
          <p>View and manage your personal and academic information.</p>
        </div>

        <div class="header-actions">
          <button class="header-btn secondary-btn" id="editProfileBtn">
            <i class="fa-solid fa-pen-to-square"></i>
            <span>Edit Profile</span>
          </button>

          <button class="header-btn primary-btn">
            <i class="fa-solid fa-file-lines"></i>
            <span>Academic Record</span>
          </button>
        </div>
      </section>

      <section class="profile-layout">

        <aside class="profile-card">
          <div class="student-photo-block">
            <img
              src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQAndem0I4Rrl05AGoEphJbj2AsPfwh8UObSg&s"
              alt="Student Photo"
              class="student-photo"
            />

            <span class="student-id-badge"></span>
          </div>

          <div class="profile-info-block">
            <span class="info-label">FULL NAME</span>
            <h3 class="info-value"></h3>
          </div>

          <div class="profile-info-block">
            <span class="info-label">IAU EMAIL</span>
            <p class="info-value-sm"></p>
          </div>

          <div class="profile-info-block">
            <span class="info-label">DEPARTMENT</span>
            <p class="info-value-sm"></p>
          </div>

          <div class="profile-info-block">
            <span class="info-label">MAJOR</span>
            <p class="info-value-sm"></p>
          </div>
        </aside>

        <div class="profile-right">

          <div class="stats-grid">

            <div class="stat-card">
              <div class="card-top">
                <div class="card-icon light-blue">
                  <i class="fa-solid fa-graduation-cap"></i>
                </div>
                <span class="status-badge badge-gold">Current</span>
              </div>

              <h2>--</h2>
              <p>Cumulative GPA <span class="stat-sub">/ 5.00</span></p>

              <div class="progress-bar">
                <div class="progress-fill" style="width: 0%;"></div>
              </div>
            </div>

            <div class="stat-card">
              <div class="card-top">
                <div class="card-icon light-blue">
                  <i class="fa-solid fa-book"></i>
                </div>
                <span class="status-badge badge-blue">In Progress</span>
              </div>

              <h2>--</h2>
              <p>Credits Earned <span class="stat-sub">/ 132</span></p>

              <div class="progress-bar">
                <div class="progress-fill" style="width: 0%;"></div>
              </div>
            </div>

            <div class="stat-card">
              <div class="card-top">
                <div class="card-icon light-gray">
                  <i class="fa-solid fa-certificate"></i>
                </div>
                <span class="status-badge badge-pink">Available</span>
              </div>

              <h2>--</h2>
              <p>My Certificates</p>
            </div>

          </div>

        </div>
      </section>

    </main>
  </div>

  <script type="module" src="../JS/profile.js"></script>
  <script src="../../Shared/JS/student-sidebar.js"></script>
</body>
</html>
