<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>IAU’ers Student - Home</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
    rel="stylesheet"
  >

  <link
    rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
  />

  <link rel="stylesheet" href="../CSS/home.css" />
  <link rel="stylesheet" href="../../Shared/CSS/student-sidebar.css" />
</head>

<body>
  <div class="layout">
    <div id="student-sidebar"></div>

    <main class="main-content">
      <section class="page-content">

        <div class="welcome-block">
          <div class="welcome-row">
            <div>
              <h1 id="greetingText">Welcome, Student</h1>
              <p id="motivationText">Make today another step toward the future you want.</p>
            </div>
            <div class="notif-wrap">
              <button class="notif-btn" id="notifBtn" type="button">
                <i class="fa-regular fa-bell"></i>
                <span class="notif-badge hidden" id="notifBadge">0</span>
              </button>
              <div class="notif-panel hidden" id="notifPanel">
                <div class="notif-panel-head">
                  <h3>Notifications</h3>
                  <button class="notif-close-btn" id="notifCloseBtn" type="button">
                    <i class="fa-solid fa-xmark"></i>
                  </button>
                </div>
                <div id="notifList" class="notif-list"></div>
              </div>
            </div>
          </div>
        </div>

        <div class="filter-row">
          <div class="filter-ctrl">

            <button class="filter-trigger" id="filterTriggerBtn" type="button">
              <i class="fa-solid fa-sliders"></i>
              <span id="filterLabel">All Colleges</span>
              <i class="fa-solid fa-chevron-down filter-arrow"></i>
            </button>
            <div class="filter-panel hidden" id="filterPanel">
              <div class="filter-search-wrap">
                <i class="fa-solid fa-magnifying-glass"></i>
                <input type="text" id="filterSearch" class="filter-search" placeholder="Search college..." />
              </div>
              <div class="filter-list" id="filterList">
                <button class="filter-option active" data-college="all" type="button">All Colleges</button>
                <button class="filter-option" data-college="CBA" type="button">College of Business Administration</button>
                <button class="filter-option" data-college="CSE" type="button">College of Computer Science</button>
                <button class="filter-option" data-college="Engineering" type="button">College of Engineering</button>
                <button class="filter-option" data-college="Medicine" type="button">College of Medicine</button>
                <button class="filter-option" data-college="Law" type="button">College of Law</button>
                <button class="filter-option" data-college="Education" type="button">College of Education</button>
              </div>
            </div>
          </div>

          <div class="sort-tabs" id="sortTabs">
            <button class="sort-tab active" data-sort="all" type="button">All</button>
            <button class="sort-tab" data-sort="recommended" type="button">
              <i class="fa-solid fa-star"></i> Recommended
            </button>
            <button class="sort-tab" data-sort="upcoming" type="button">
              <i class="fa-regular fa-calendar"></i> Upcoming
            </button>
            <button class="sort-tab" data-sort="ending" type="button">
              <i class="fa-solid fa-fire"></i> Ending Soon
            </button>
          </div>
        </div>

        <section class="events-section">
          <div class="section-header">
            <div class="section-title">
              <span class="title-line"></span>
              <h2>Available Events</h2>
            </div>

            <button class="show-all-btn" type="button">
              Show all
              <i class="fa-solid fa-chevron-right"></i>
            </button>
          </div>

          <div id="studentEventsList" class="events-slider"></div>
        </section>

        <section class="events-section">
          <div class="section-header">
            <div class="section-title">
              <span class="title-line"></span>
              <h2>Announcements</h2>
            </div>

            <button class="show-all-btn" type="button">
              Show all
              <i class="fa-solid fa-chevron-right"></i>
            </button>
          </div>

          <div id="announcementsList" class="events-slider">
            <div class="announcement-card">
              <div class="announcement-top">Coming Soon</div>
              <h3>Student Announcements</h3>
              <p>Announcements will be connected to Firebase later.</p>
            </div>
          </div>
        </section>

      </section>
    </main>
  </div>

  <div id="eventDetailsModal" class="event-modal">
    <div class="event-modal-content">
      <button id="closeEventModal" class="close-event-btn" type="button">
        <i class="fa-solid fa-xmark"></i>
      </button>

      <img id="modalEventImage" class="modal-event-image" src="" alt="Event Image" />

      <div class="modal-event-body">
        <div class="modal-event-top">
          <h2 id="modalEventTitle"></h2>
          <button class="register-btn" type="button">Register</button>
        </div>

        <p id="modalEventDescription"></p>

        <div class="modal-event-info">
          <div class="info-row">
            <i class="fa-regular fa-calendar"></i>
            <span id="modalEventDate"></span>
          </div>

          <div class="info-row">
            <i class="fa-solid fa-location-dot"></i>
            <span id="modalEventLocation"></span>
          </div>

          <div class="info-row">
            <i class="fa-solid fa-chair"></i>
            <span id="modalEventCapacity"></span>
          </div>
        </div>
      </div>
    </div>
  </div>


  <!-- Image Lightbox -->
  <div id="imgLightbox" class="img-lightbox hidden">
    <button id="closeLightbox" class="lightbox-close-btn" type="button">
      <i class="fa-solid fa-xmark"></i>
    </button>
    <img id="lightboxImg" src="" alt="Full size event image" />
  </div>

  <script src="../../Shared/JS/student-sidebar.js"></script>
  <script type="module" src="../JS/home.js"></script>
</body>
</html>
