<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>IAU’ers Admin - Users</title>

  <link rel="stylesheet" href="../CSS/users.css" />
  <link rel="stylesheet" href="../../Shared/CSS/admin-sidebar.css" />
  <link
    rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
  />
</head>
<body>
  <div class="dashboard-container">
    <!-- Shared Sidebar -->
    <div id="admin-sidebar"></div>

    <!-- Main -->
    <main class="main-content">
            
      <!-- Page Header -->
      <section class="page-intro">
        <h1>User Management</h1>
        <p>Manage students</p>
      </section>

      <!-- Stats -->
      <section class="users-content">
        <div class="stats-grid">
          <div class="stat-card">
            <div class="stat-icon blue-bg">
              <i class="fa-solid fa-users"></i>
            </div>
            <h3 id="totalUsersCount">0</h3>
            <p>Total Users</p>
          </div>

          <div class="stat-card">
            <div class="stat-icon green-bg">
              <i class="fa-solid fa-user-check"></i>
            </div>
            <h3 id="activeUsersCount">0</h3>
            <p>Active</p>
          </div>

          <div class="stat-card">
            <div class="stat-icon gray-bg">
              <i class="fa-solid fa-user-xmark"></i>
            </div>
            <h3 id="inactiveUsersCount">0</h3>
            <p>Inactive</p>
          </div>
        </div>

        <!-- Search -->
        <div class="users-search-box">
          <i class="fa-solid fa-magnifying-glass"></i>
          <input type="text" id="userSearch" placeholder="Search by name, email, or department..." />
        </div>

        <!-- Filter Tabs -->
        <div class="filter-tabs">
          <button class="tab-btn active" data-filter="all">All</button>
          <button class="tab-btn" data-filter="active">Active</button>
          <button class="tab-btn" data-filter="inactive">Inactive</button>
        </div>

        <!-- Users Table -->
        <div class="users-table-wrap">
          <table class="users-table">
            <thead>
              <tr>
                <th>User</th>
                <th>Email</th>
                <th>Role</th>
                <th>Department</th>
                <th>Status</th>
                <th>Last Login</th>
              </tr>
            </thead>
            <tbody id="usersTableBody"></tbody>
          </table>
          <div id="usersEmptyState" class="users-empty-state" style="display:none;">
            <i class="fa-solid fa-magnifying-glass"></i>
            <p>No users found.</p>
          </div>
        </div>
      </section>
    </main>
  </div>

  <script src="../../Shared/JS/admin-sidebar.js"></script>
  <script type="module" src="../JS/users.js"></script>
</body>
</html>
